[platformio]
default_envs = ble_beacon

[env]
platform = espressif32 @ 6.7.0
framework = arduino
board = esp32dev
monitor_speed = 115200

[env:ble_beacon]
build_src_filter = +<ble_beacon.cpp>

[env:ble_scanner]
build_src_filter = +<ble_scanner.cpp>

[env:uwb_initiator]
build_src_filter = +<uwb_initiator.cpp>
build_flags =
  -DCHIP_SELECT_PIN=5
upload_speed = 115200

[env:uwb_responder]
build_src_filter = +<uwb_responder.cpp>
build_flags =
  -DCHIP_SELECT_PIN=5
upload_speed = 115200